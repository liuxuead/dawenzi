<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>打蚊子游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 顶部区域：雷达、等级分数、HP电力 -->
        <div class="top-section">
            <div class="radar" id="radar">
                <div class="radar-circle"></div>
                <div class="radar-crosshair">
                    <div class="radar-line horizontal"></div>
                    <div class="radar-line vertical"></div>
                </div>
            </div>
            <div class="top-info">
                <div class="level-section">
                    <span class="info-label">等级</span>
                    <span class="level-value" id="levelValue">1</span>
                </div>
                <div class="score-section">
                    <span class="info-label">分数</span>
                    <span class="score-value" id="scoreValue">0</span>
                    <span class="score-separator">/</span>
                    <span class="high-score-value" id="highScoreValue">0</span>
                </div>
                <div class="debug-info" id="debugInfo" style="font-size: 12px; color: #ffcc00; margin-top: 5px;">
                    手指数: 0 | 落点: -
                </div>
            </div>
            <div class="player-status">
                <div class="player-health-section">
                    <span class="status-label">HP</span>
                    <div class="player-health-bar">
                        <div class="player-health-fill" id="playerHealthFill"></div>
                    </div>
                </div>
                <div class="power-section">
                    <span class="status-label">电力</span>
                    <div class="power-bar">
                        <div class="power-fill" id="powerFill"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 游戏区域：蚊子 -->
        <div class="game-area" id="gameArea">
            <!-- 蚊子用黑球代替，30px直径 -->
            <div class="mosquito" style="top: 15%; left: 60%;"></div>
            <div class="mosquito" style="top: 25%; left: 75%;"></div>
            <div class="mosquito" style="top: 35%; left: 55%;"></div>
            <!-- 轨迹SVG -->
            <svg id="trailSvg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;">
            </svg>
        </div>

        <!-- 炮筒区域 -->
        <div class="cannon-section">
            <div class="cannon-base"></div>
            <div class="cannon-barrel" id="cannonBarrel">
                <div class="cannon-muzzle"></div>
            </div>
            <div class="cannon-balls" id="cannonBalls">
                <div class="ball"></div>
                <div class="ball"></div>
                <div class="ball"></div>
            </div>
        </div>

        <!-- 底部按钮区域 -->
        <div class="controls">
            <div class="arrow-container">
                <button class="arrow-btn left" id="btnLeft"></button>
                <button class="arrow-btn right" id="btnRight"></button>
            </div>
            <button class="control-btn green" id="btnGreen" data-color="green">绿</button>
            <button class="control-btn red" id="btnRed" data-color="red">红</button>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2>恭喜！全部消灭！</h2>
            <p>点击按钮重新开始</p>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
    </div>

    <!-- 音效 -->
    <audio id="zapperSound" src="zapper.mp3"></audio>
    <audio id="meizidanSound" src="meizidan.mp3"></audio>
    <audio id="bgmSound" src="weng.mp3" loop></audio>

    <script src="game.js"></script>
</body>
</html>
